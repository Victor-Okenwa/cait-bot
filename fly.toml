app = 'cait-agent'
primary_region = 'jnb'

[build]
  dockerfile = "Dockerfile.agent"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1024mb'
  cpus = 1
